<!DOCTYPE html>
<html>
<head>
  <title>Sense3 Screen</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 40px;
    }
    .item {
      margin-bottom: 20px;
      font-size: 24px;
    }
  </style>
</head>
<body>

<h2>Requests</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMoeGpRpLb8Ooh47WIlKCrCPC7ocZ2ZUo",
  authDomain: "play-chatbox.firebaseapp.com",
  projectId: "play-chatbox"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const q = query(collection(db, "sense3_requests"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();

    if (d.status !== "approved") return;
    
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = `${d.name} requested "${d.artist} - ${d.song}"`;

    list.appendChild(div);
  });
});
</script>

</body>
</html>
