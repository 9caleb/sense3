<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* 🔥 高级暗红动态背景（烟雾感） */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background:
    radial-gradient(circle at 20% 30%, rgba(120,0,0,0.35), transparent),
    radial-gradient(circle at 80% 60%, rgba(80,0,0,0.4), transparent),
    radial-gradient(circle at 50% 80%, rgba(150,0,0,0.25), transparent),
    #050000;
  filter: blur(120px);
  animation: bgMove 35s ease-in-out infinite;
  z-index: -2;
}

@keyframes bgMove {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-8%, -6%) scale(1.05); }
  100% { transform: translate(0,0) scale(1); }
}

/* grain */
body::after {
  content:"";
  position: fixed;
  width:100%;
  height:100%;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.12;
  z-index:-1;
}

/* layout */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT 40% */
.left {
  width: 40%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.left img {
  width: 320px; /* 🔥 QR 放大 */
}

.left p {
  margin-top: 20px;
  font-size: 18px;
  letter-spacing: 2px;
  opacity: 0.7;
}

/* LOGO（移上去避免压内容） */
.logo {
  position: absolute;
  top: 40px; /* 🔥 往上推 */
  left: 50%;
  transform-style: preserve-3d;
  transform: translateX(-50%) rotateY(0deg);
  animation: spin3d 14s linear infinite;
}

.logo img {
  width: 70px;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.25));
}

@keyframes spin3d {
  0% { transform: translateX(-50%) rotateY(0deg); }
  100% { transform: translateX(-50%) rotateY(360deg); }
}

/* RIGHT 60% */
.right {
  width: 60%;
  padding: 180px 100px 80px 120px; /* 🔥 下移 + 左padding */
}

/* request */
.request {
  margin-bottom: 60px;
  animation: fadeIn 0.5s ease;
}

.name {
  font-size: 22px;
  font-weight: bold;
}

.song {
  margin-top: 14px;
  font-size: 28px;
  padding-left: 40px;
}

.tip {
  margin-top: 10px;
  color: #ff8a2b;
  font-size: 16px;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(15px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png">
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img src="qr.png">
    <p>REQUEST A SONG</p>
  </div>

  <!-- RIGHT -->
  <div class="right" id="list"></div>

</div>

<script>
const colors = ["#ff4d6d","#4da6ff","#b84dff","#ff944d","#4dff88"];
const users = {};

function getColor(name) {
  if (!users[name]) {
    users[name] = colors[Math.floor(Math.random()*colors.length)];
  }
  return users[name];
}

let data = [
  {name:"Dato AK", artist:"Daddy Yankee", song:"Gasolina", tip:200},
  {name:"Amanda", artist:"Nina Sky", song:"Move Your Body"},
  {name:"Boss Iwan", artist:"John Summit", song:"Where You Are"}
];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.sort((a,b)=>(b.tip||0)-(a.tip||0));

  data.forEach(d => {
    const div = document.createElement("div");
    div.className = "request";

    const color = getColor(d.name);

    div.innerHTML = `
      <div class="name" style="color:${color}">
        ${d.name} requested:
      </div>

      <div class="song">
        ${d.artist} - ${d.song}
      </div>

      ${d.tip ? `<div class="tip">🔥 RM${d.tip} TIP</div>` : ""}
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
