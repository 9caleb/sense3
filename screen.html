<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
  background: #040000;
}

/* 🔥 动态暗红烟雾（保持高级红，不血红） */
.bg1, .bg2, .bg3 {
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  filter: blur(120px);
  z-index: 0;
}

.bg1 {
  background:
    radial-gradient(circle at 30% 40%, rgba(120,0,0,0.35), transparent 60%),
    radial-gradient(circle at 70% 60%, rgba(80,0,0,0.35), transparent 60%);
  animation: move1 14s ease-in-out infinite;
}

.bg2 {
  background:
    radial-gradient(circle at 60% 30%, rgba(100,0,0,0.25), transparent 60%),
    radial-gradient(circle at 40% 80%, rgba(140,0,0,0.25), transparent 60%);
  animation: move2 10s ease-in-out infinite;
}

.bg3 {
  background:
    radial-gradient(circle at 50% 50%, rgba(160,0,0,0.2), transparent 70%);
  animation: wave 6s ease-in-out infinite;
}

@keyframes move1 {
  0% { transform: translate(0,0); }
  50% { transform: translate(-8%, -6%); }
  100% { transform: translate(0,0); }
}

@keyframes move2 {
  0% { transform: translate(0,0); }
  50% { transform: translate(6%, -8%); }
  100% { transform: translate(0,0); }
}

@keyframes wave {
  0% { transform: scale(1) translateX(0); }
  50% { transform: scale(1.1) translateX(-3%); }
  100% { transform: scale(1) translateX(0); }
}

/* grain */
.noise {
  position: fixed;
  width:100%;
  height:100%;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.12;
  z-index:1;
}

/* layout */
.container {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 2;
}

/* LEFT */
.left {
  width: 40%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.left img {
  width: 420px;
}

.left p {
  margin-top: 20px;
  font-size: 18px;
  letter-spacing: 2px;
  opacity: 0.75;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 50%;
  transform-style: preserve-3d;
  transform: translateX(-50%) rotateY(0deg);
  animation: spin3d 12s linear infinite;
  z-index: 3;
}

.logo img {
  width: 70px;
  filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
}

@keyframes spin3d {
  0% { transform: translateX(-50%) rotateY(0deg); }
  100% { transform: translateX(-50%) rotateY(360deg); }
}

/* RIGHT */
.right {
  width: 60%;
  padding: 200px 120px 60px 160px;
}

/* request */
.request {
  margin-bottom: 30px;
  animation: fadeIn 0.4s ease;
}

.name {
  font-size: 22px;
  font-weight: bold;
}

.song {
  margin-top: 10px;
  font-size: 26px;
  padding-left: 30px;
}

.tip {
  margin-top: 6px;
  color: #ff8a2b;
  font-size: 14px;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(8px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>
<div class="noise"></div>

<div class="logo">
  <img src="logo.png">
</div>

<div class="container">

  <div class="left">
    <img src="qr.png">
    <p>REQUEST A SONG</p>
  </div>

  <div class="right" id="list"></div>

</div>

<script>
const palette = [
  "#ff4d6d","#4da6ff","#b84dff","#ff944d",
  "#4dff88","#ffd24d","#ff66cc","#66ffff"
];

const userColorMap = {};
let index = 0;

function getColor(name) {
  if (!userColorMap[name]) {
    userColorMap[name] = palette[index % palette.length];
    index++;
  }
  return userColorMap[name];
}

let data = [
  {name:"Dato AK", artist:"Daddy Yankee", song:"Gasolina", tip:200},
  {name:"Amanda", artist:"Nina Sky", song:"Move Your Body"},
  {name:"Boss Iwan", artist:"John Summit", song:"Where You Are"}
];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.sort((a,b)=>(b.tip||0)-(a.tip||0));

  data.forEach(d => {
    const div = document.createElement("div");
    div.className = "request";

    const color = getColor(d.name);

    div.innerHTML = `
      <div class="name" style="color:${color}">
        ${d.name} requested:
      </div>

      <div class="song">
        ${d.artist} - ${d.song}
      </div>

      ${d.tip ? `<div class="tip">🔥 RM${d.tip} TIP</div>` : ""}
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
