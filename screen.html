<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: black;
}

/* layout */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT */
.left {
  width: 38%;
  position: relative;
  overflow: hidden;
}

.left video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* dark overlay */
.left::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

.leftContent {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

.leftContent img {
  width: 75%;
}

.leftContent p {
  margin-top: 20px;
  letter-spacing: 2px;
  opacity: 0.8;
}

/* RIGHT */
.right {
  width: 62%;
  position: relative;
  overflow: hidden;
}

/* dual video (crossfade) */
.videoLayer {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.8s ease;
}

#videoA { z-index: 1; opacity: 1; }
#videoB { z-index: 1; opacity: 0; }

/* feed */
.feed {
  position: relative;
  z-index: 2;
  color: white;
  padding: 180px 10% 60px 10%;
}

/* request */
.request {
  margin-bottom: 20px;
}

.name {
  font-size: 22px;
  font-weight: bold;
}

.song {
  margin-top: 8px;
  font-size: 26px;
  padding-left: 20px;
}

.tip {
  margin-top: 5px;
  font-size: 14px;
  color: orange;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 50%;
  transform-style: preserve-3d;
  transform: translateX(-50%) rotateY(0deg);
  animation: spin 12s linear infinite;
  z-index: 5;
}

.logo img {
  width: 70px;
}

@keyframes spin {
  0% { transform: translateX(-50%) rotateY(0deg); }
  100% { transform: translateX(-50%) rotateY(360deg); }
}
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png">
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <video src="https://res.cloudinary.com/dbdiasouj/video/upload/v1782338377/lefft_ukxhta.mp4" autoplay muted loop playsinline></video>

    <div class="leftContent">
      <img src="qr.png">
      <p>REQUEST A SONG</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <video id="videoA" class="videoLayer" autoplay muted playsinline></video>
    <video id="videoB" class="videoLayer" muted playsinline></video>

    <div class="feed" id="feed"></div>

  </div>

</div>

<script>
const sources = [
  "https://res.cloudinary.com/dbdiasouj/video/upload/v1782338445/club1_bjhygx.mp4",
  "https://res.cloudinary.com/dbdiasouj/video/upload/v1782338591/club2_bzh58c.mp4"
];

let index = 0;
let active = true;

const videoA = document.getElementById("videoA");
const videoB = document.getElementById("videoB");

videoA.src = sources[0];
videoA.play();

videoA.onended = () => switchVideo(videoA, videoB);
videoB.onended = () => switchVideo(videoB, videoA);

function switchVideo(current, next) {
  index = (index + 1) % sources.length;
  next.src = sources[index];
  next.play();

  next.style.opacity = 1;
  current.style.opacity = 0;
}

/* feed */
const data = [
  {name:"Dato AK", artist:"Daddy Yankee", song:"Gasolina", tip:200},
  {name:"Amanda", artist:"Nina Sky", song:"Move Your Body"},
  {name:"Boss Iwan", artist:"John Summit", song:"Where You Are"}
];

const colors = ["#ff4d6d","#4da6ff","#b84dff","#ff944d","#4dff88","#ffd24d"];
const map = {};
let i = 0;

function getColor(name){
  if(!map[name]){
    map[name] = colors[i % colors.length];
    i++;
  }
  return map[name];
}

const feed = document.getElementById("feed");

data.sort((a,b)=>(b.tip||0)-(a.tip||0));

data.forEach(d=>{
  const div = document.createElement("div");
  div.className = "request";

  div.innerHTML = `
    <div class="name" style="color:${getColor(d.name)}">
      ${d.name} requested:
    </div>

    <div class="song">
      ${d.artist} - ${d.song}
    </div>

    ${d.tip ? `<div class="tip">🔥 RM${d.tip} TIP</div>` : ""}
  `;

  feed.appendChild(div);
});
</script>

</body>
</html>
