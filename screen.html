<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
  background: #050000;
}

/* 🔥 真正“会动”的烟雾层（多层叠加） */
.bg1, .bg2, .bg3 {
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  filter: blur(120px);
  opacity: 0.5;
}

.bg1 {
  background: radial-gradient(circle, rgba(180,0,0,0.35), transparent 60%);
  animation: move1 30s ease-in-out infinite;
}

.bg2 {
  background: radial-gradient(circle, rgba(100,0,0,0.4), transparent 60%);
  animation: move2 45s ease-in-out infinite;
}

.bg3 {
  background: radial-gradient(circle, rgba(220,0,0,0.25), transparent 60%);
  animation: move3 60s ease-in-out infinite;
}

@keyframes move1 {
  0% { transform: translate(0,0); }
  50% { transform: translate(-10%, -5%); }
  100% { transform: translate(0,0); }
}

@keyframes move2 {
  0% { transform: translate(0,0); }
  50% { transform: translate(8%, -8%); }
  100% { transform: translate(0,0); }
}

@keyframes move3 {
  0% { transform: translate(0,0); }
  50% { transform: translate(-6%, 6%); }
  100% { transform: translate(0,0); }
}

/* grain texture */
.noise {
  position: fixed;
  width:100%;
  height:100%;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.15;
}

/* layout */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT */
.left {
  width: 40%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.left img {
  width: 380px; /* 🔥 再放大 QR */
}

.left p {
  margin-top: 20px;
  font-size: 18px;
  letter-spacing: 2px;
  opacity: 0.7;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 50%;
  transform-style: preserve-3d;
  transform: translateX(-50%) rotateY(0deg);
  animation: spin3d 16s linear infinite;
}

.logo img {
  width: 70px;
  filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
}

@keyframes spin3d {
  0% { transform: translateX(-50%) rotateY(0deg); }
  100% { transform: translateX(-50%) rotateY(360deg); }
}

/* RIGHT */
.right {
  width: 60%;
  padding: 220px 100px 60px 140px; /* 🔥 往下移远离logo */
}

/* request */
.request {
  margin-bottom: 35px; /* 🔥 缩小间距 */
  animation: fadeIn 0.5s ease;
}

.name {
  font-size: 22px;
  font-weight: bold;
}

.song {
  margin-top: 10px;
  font-size: 26px;
  padding-left: 30px;
}

.tip {
  margin-top: 6px;
  color: #ff8a2b;
  font-size: 15px;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>
<div class="noise"></div>

<div class="logo">
  <img src="logo.png">
</div>

<div class="container">

  <div class="left">
    <img src="qr.png">
    <p>REQUEST A SONG</p>
  </div>

  <div class="right" id="list"></div>

</div>

<script>
const colors = ["#ff4d6d","#4da6ff","#b84dff","#ff944d","#4dff88"];
const users = {};

function getColor(name) {
  if (!users[name]) {
    users[name] = colors[Math.floor(Math.random()*colors.length)];
  }
  return users[name];
}

let data = [
  {name:"Dato AK", artist:"Daddy Yankee", song:"Gasolina", tip:200},
  {name:"Amanda", artist:"Nina Sky", song:"Move Your Body"},
  {name:"Boss Iwan", artist:"John Summit", song:"Where You Are"}
];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.sort((a,b)=>(b.tip||0)-(a.tip||0));

  data.forEach(d => {
    const div = document.createElement("div");
    div.className = "request";

    const color = getColor(d.name);

    div.innerHTML = `
      <div class="name" style="color:${color}">
        ${d.name} requested:
      </div>

      <div class="song">
        ${d.artist} - ${d.song}
      </div>

      ${d.tip ? `<div class="tip">🔥 RM${d.tip} TIP</div>` : ""}
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
