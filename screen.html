<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
  background: #020000;
}

/* 🔥 动态流动烟雾（明显在动） */
.bg {
  position: fixed;
  width: 300%;
  height: 300%;
  top: -100%;
  left: -100%;
  z-index: 0;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,0,60,0.25), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(180,0,0,0.35), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(255,40,40,0.2), transparent 50%);
  filter: blur(100px);
  animation: flow 12s linear infinite;
}

@keyframes flow {
  0% { transform: translate(0,0) rotate(0deg) scale(1); }
  50% { transform: translate(-10%, -8%) rotate(8deg) scale(1.1); }
  100% { transform: translate(0,0) rotate(0deg) scale(1); }
}

/* 波浪层（增强动态） */
.wave {
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, rgba(255,0,0,0.15), transparent 60%);
  z-index: 0;
  animation: waveMove 6s ease-in-out infinite;
}

@keyframes waveMove {
  0% { transform: translateX(0); }
  50% { transform: translateX(-5%); }
  100% { transform: translateX(0); }
}

/* grain */
.noise {
  position: fixed;
  width:100%;
  height:100%;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.1;
  z-index: 1;
}

/* layout */
.container {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 2; /* 🔥 内容在最上面 */
}

/* LEFT */
.left {
  width: 40%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.left img {
  width: 420px; /* 🔥 更大 QR */
}

.left p {
  margin-top: 20px;
  font-size: 18px;
  letter-spacing: 2px;
  opacity: 0.8;
}

/* LOGO */
.logo {
  position: absolute;
  top: 30px;
  left: 50%;
  transform-style: preserve-3d;
  transform: translateX(-50%) rotateY(0deg);
  animation: spin3d 10s linear infinite;
  z-index: 3;
}

.logo img {
  width: 70px;
  filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
}

@keyframes spin3d {
  0% { transform: translateX(-50%) rotateY(0deg); }
  100% { transform: translateX(-50%) rotateY(360deg); }
}

/* RIGHT */
.right {
  width: 60%;
  padding: 200px 120px 60px 160px;
}

/* request */
.request {
  margin-bottom: 30px; /* 🔥 缩小间距 */
  animation: fadeIn 0.4s ease;
}

.name {
  font-size: 22px;
  font-weight: bold;
}

.song {
  margin-top: 10px;
  font-size: 26px;
  padding-left: 30px;
}

.tip {
  margin-top: 5px;
  color: #ff8a2b;
  font-size: 14px;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(8px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="wave"></div>
<div class="noise"></div>

<div class="logo">
  <img src="logo.png">
</div>

<div class="container">

  <div class="left">
    <img src="qr.png">
    <p>REQUEST A SONG</p>
  </div>

  <div class="right" id="list"></div>

</div>

<script>
/* 🔥 固定颜色系统（不会重复） */
const colorPalette = [
  "#ff4d6d",
  "#4da6ff",
  "#b84dff",
  "#ff944d",
  "#4dff88",
  "#ffd24d",
  "#ff66cc",
  "#66ffff"
];

const userColors = {};
let colorIndex = 0;

function getColor(name) {
  if (!userColors[name]) {
    userColors[name] = colorPalette[colorIndex % colorPalette.length];
    colorIndex++;
  }
  return userColors[name];
}

let data = [
  {name:"Dato AK", artist:"Daddy Yankee", song:"Gasolina", tip:200},
  {name:"Amanda", artist:"Nina Sky", song:"Move Your Body"},
  {name:"Boss Iwan", artist:"John Summit", song:"Where You Are"}
];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.sort((a,b)=>(b.tip||0)-(a.tip||0));

  data.forEach(d => {
    const div = document.createElement("div");
    div.className = "request";

    const color = getColor(d.name);

    div.innerHTML = `
      <div class="name" style="color:${color}">
        ${d.name} requested:
      </div>

      <div class="song">
        ${d.artist} - ${d.song}
      </div>

      ${d.tip ? `<div class="tip">🔥 RM${d.tip} TIP</div>` : ""}
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
