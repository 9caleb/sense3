<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow: hidden;
  background: radial-gradient(circle at center, #4a0000, #000);
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.15;
}

.container {
  display: flex;
  height: 100vh;
}

.left {
  width: 25%;
  text-align: center;
  padding-top: 80px;
}

.left img {
  width: 200px;
}

.left p {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.7;
}

.centerLogo {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.centerLogo img {
  width: 70px;
  animation: spin 30s linear infinite;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
}

@keyframes spin {
  from {transform: rotate(0deg);}
  to {transform: rotate(360deg);}
}

.right {
  width: 75%;
  padding: 100px 40px;
  overflow: hidden;
}

.request {
  margin-bottom: 40px;
  animation: fadeIn 0.6s ease;
}

.name {
  color: #ff4d4d;
  font-weight: bold;
}

.song {
  margin-top: 10px;
  font-size: 22px;
}

.tip {
  margin-top: 8px;
  color: #ff9933;
  font-size: 14px;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="centerLogo">
  <img src="logo.png">
</div>

<div class="container">

  <div class="left">
    <img src="qr.png">
    <p>REQUEST A SONG</p>
  </div>

  <div class="right" id="list"></div>

</div>

<script>
const data = [
  {name:"Dato AK", artist:"Daddy Yankee", song:"Gasolina", tip:200},
  {name:"Amanda", artist:"Nina Sky", song:"Move Your Body"},
  {name:"Boss Iwan", artist:"John Summit", song:"Where You Are"}
];

const list = document.getElementById("list");

function render() {
  list.innerHTML = "";

  data.sort((a,b)=>(b.tip||0)-(a.tip||0));

  data.forEach(d => {
    const div = document.createElement("div");
    div.className = "request";

    div.innerHTML = `
      <div><span class="name">${d.name}</span> requested:</div>
      <div class="song">${d.artist} - ${d.song}</div>
      ${d.tip ? `<div class="tip">🔥 RM${d.tip} TIP</div>` : ""}
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
