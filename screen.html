<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: black;
}

/* layout */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT */
.left {
  width: 38%;
  position: relative;
  overflow: hidden;
}

.left video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 左边暗 */
.left::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}

/* 左边内容 */
.leftContent {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

/* LOGO（更大） */
.logoLeft img {
  width: 110px;
  margin-bottom: 35px;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.25));
}

/* QR */
.qr {
  width: 65%;
}

/* TEXT */
.leftContent p {
  margin-top: 20px;
  font-size: 22px;
  letter-spacing: 3px;
  opacity: 0.85;
}

/* RIGHT */
.right {
  width: 62%;
  position: relative;
  overflow: hidden;
}

/* video */
.videoLayer {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.8s ease;
  z-index: 1;
}

#videoA { opacity: 1; }
#videoB { opacity: 0; }

/* 🔥 修好：覆盖整个右边 */
.right::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2;
  pointer-events: none;
}

/* feed */
.feed {
  position: relative;
  z-index: 3;
  color: white;
  padding: 180px 10% 60px 10%;
}

/* request */
.request {
  margin-bottom: 18px;
}

.name {
  font-size: 22px;
  font-weight: bold;
}

.song {
  margin-top: 8px;
  font-size: 26px;
  padding-left: 20px;
  color: white;
}

.tip {
  margin-top: 5px;
  font-size: 14px;
  color: orange;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <video src="https://res.cloudinary.com/dbdiasouj/video/upload/v1782338377/lefft_ukxhta.mp4" autoplay muted loop playsinline></video>

    <div class="leftContent">
      <div class="logoLeft">
        <img src="logo.png">
      </div>

      <img class="qr" src="qr.png">

      <p>REQUEST A SONG</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <video id="videoA" class="videoLayer" autoplay muted playsinline></video>
    <video id="videoB" class="videoLayer" muted playsinline></video>

    <div class="feed" id="feed"></div>

  </div>

</div>

<script>
const sources = [
  "https://res.cloudinary.com/dbdiasouj/video/upload/v1782338855/club1_zusyai.mp4",
  "https://res.cloudinary.com/dbdiasouj/video/upload/v1782338941/club2_qumlix.mp4"
];

let index = 0;

const videoA = document.getElementById("videoA");
const videoB = document.getElementById("videoB");

videoA.src = sources[0];
videoA.play();

videoA.onended = () => switchVideo(videoA, videoB);
videoB.onended = () => switchVideo(videoB, videoA);

function switchVideo(current, next) {
  index = (index + 1) % sources.length;
  next.src = sources[index];
  next.play();

  next.style.opacity = 1;
  current.style.opacity = 0;
}

</script>

<script type="module" src="screen/feed.js"></script>  
  
</body>
</html>
