<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

html,
body{

    margin:0;

    width:100%;

    height:100%;

    overflow:hidden;

    background:#000;

    font-family:

        Inter,

        Arial,

        sans-serif;

}

/* ========================= */

.screen{

    position:relative;

    width:192px;

    height:576px;

    margin:auto;

    overflow:hidden;

    background:#000;

}

/* ========================= */

.videoLayer{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    object-fit:cover;

    object-position:center center;

    transition:opacity .8s ease;

    z-index:1;

}

#videoA{

    opacity:1;

}

#videoB{

    opacity:0;

}

/* ========================= */

.overlay{

    position:absolute;

    inset:0;

    z-index:2;

    background:

        linear-gradient(

            180deg,

            rgba(0,0,0,.15),

            rgba(0,0,0,.72)

        );

}

/* ========================= */

.feed{

    position:absolute;

    inset:0;

    z-index:3;

    display:flex;

    flex-direction:column;

    padding:18px 16px;

    overflow:hidden;

}

/* ========================= */

.request{

    position:relative;

    padding:0 0 18px 0;

    margin-bottom:18px;

    opacity:0;

    animation:fadeIn .5s ease forwards;

}

.request::after{

    content:"";

    display:block;

    width:88%;

    height:1px;

    margin:18px auto 0;

    background:rgba(255,255,255,.08);

}

/* ========================= */

.name{

    font-size:20px;

    font-weight:800;

    letter-spacing:1px;

    text-transform:uppercase;

}

/* ========================= */

.artist{

    margin-top:8px;

    font-size:11px;

    color:rgba(255,255,255,.55);

    font-weight:600;

    letter-spacing:.8px;

}

/* ========================= */

.song{

    margin-top:4px;

    font-size:24px;

    font-weight:700;

    color:#fff;

    line-height:1.15;

}

/* ========================= */

@keyframes fadeIn{

    from{

        opacity:0;

        transform:

            translateY(14px);

    }

    to{

        opacity:1;

        transform:

            translateY(0);

    }

}

</style>

</head>

<body>

<div class="screen">

    <video
        id="videoA"
        class="videoLayer"
        autoplay
        muted
        playsinline
    ></video>

    <video
        id="videoB"
        class="videoLayer"
        muted
        playsinline
    ></video>

    <div class="overlay"></div>

    <div
        class="feed"
        id="feed"
    ></div>

</div>
  
<script>
const sources = [
  "https://res.cloudinary.com/dbdiasouj/video/upload/v1782338855/club1_zusyai.mp4",
  "https://res.cloudinary.com/dbdiasouj/video/upload/v1782338941/club2_qumlix.mp4"
];

let index = 0;

const videoA = document.getElementById("videoA");
const videoB = document.getElementById("videoB");

videoA.src = sources[0];
videoA.play();

videoA.onended = () => switchVideo(videoA, videoB);
videoB.onended = () => switchVideo(videoB, videoA);

function switchVideo(current, next) {
  index = (index + 1) % sources.length;
  next.src = sources[index];
  next.play();

  next.style.opacity = 1;
  current.style.opacity = 0;
}

</script>

<script type="module" src="screen/feed.js"></script>  
  
</body>
</html>
