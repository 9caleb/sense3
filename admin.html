<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 40px;
    }
    .item {
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }
    button {
      margin-right: 10px;
      padding: 6px 10px;
      border: none;
      cursor: pointer;
    }
    .approve { background: green; color: white; }
    .reject { background: red; color: white; }
  </style>
</head>
<body>

<h2>Admin Panel</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMoeGpRpLb8Ooh47WIlKCrCPC7ocZ2ZUo",
  authDomain: "play-chatbox.firebaseapp.com",
  projectId: "play-chatbox"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db, "sense3_requests"), (snapshot) => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(docSnap => {
    const d = docSnap.data();

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${d.name}</b> requested "${d.artist} - ${d.song}" <br>
      Status: ${d.status}
      <br><br>
      <button class="approve">Approve</button>
      <button class="reject">Reject</button>
    `;

    div.querySelector(".approve").onclick = async () => {
      await updateDoc(doc(db, "sense3_requests", docSnap.id), {
        status: "approved"
      });
    };

    div.querySelector(".reject").onclick = async () => {
      await updateDoc(doc(db, "sense3_requests", docSnap.id), {
        status: "rejected"
      });
    };

    list.appendChild(div);
  });
});
</script>

</body>
</html>
