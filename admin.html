<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sense Request Admin</title>

<link rel="stylesheet" href="admin/style.css">

</head>

<body>

<!-- Login -->

<div id="loginPage" class="login">

    <div class="loginBox">

        <h2>Sense Admin</h2>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button id="loginBtn">
            LOGIN
        </button>

    </div>

</div>

<!-- Dashboard -->

<div id="dashboard" style="display:none;">

    <header class="header">

        <div class="headerLeft">

            <img
                src="logo.png"
                class="logo"
            >

            <div class="title">
                SENSE REQUEST ADMIN
            </div>

        </div>

        <div class="headerRight">

            <div class="stat">
                Total
                <span id="totalRequests">0</span>
            </div>

            <div class="stat">
                Pending
                <span id="pendingRequests">0</span>
            </div>

            <div class="stat">
                Approved
                <span id="approvedRequests">0</span>
            </div>

            <div class="stat">
                Rejected
                <span id="rejectedRequests">0</span>
            </div>

            <div class="stat">
                Tips
                <span id="tipRequests">0</span>
            </div>

        </div>

    </header>

    <!-- Tabs -->

    <div class="tabs">

        <div class="tab active" data-tab="all">
            All
        </div>

        <div class="tab" data-tab="pending">
            Pending
        </div>

        <div class="tab" data-tab="approved">
            Approved
        </div>

        <div class="tab" data-tab="rejected">
            Rejected
        </div>

        <div class="tab" data-tab="tips">
            Tips
        </div>

    </div>
    
<!-- Request List -->

<div class="list">

    <div class="requestRow headerRow">

        <div>TIME</div>

        <div>NAME</div>

        <div>REQUEST</div>

        <div>STATUS</div>

        <div>ACTION</div>

    </div>

    <div id="list"></div>

</div>

<!-- Receipt Popup -->

<div
    id="receiptModal"
    class="modal"
>

    <div class="modalContent">

        <img
            id="receiptImage"
            src=""
        >

        <div class="actions">

            <button
                class="delete"
                id="closeReceipt"
            >
                Close
            </button>

        </div>

    </div>

</div>

<!-- Confirm Modal -->

<div
    id="confirmModal"
    class="modal"
>

    <div class="modalContent">

        <h2 id="confirmTitle">
            Confirm
        </h2>

        <p id="confirmMessage">
        </p>

        <div class="actions">

            <button
                id="cancelButton"
                class="delete"
            >
                Cancel
            </button>

            <button
                id="confirmButton"
                class="approve"
            >
                Confirm
            </button>

        </div>

    </div>

</div>

<script type="module" src="admin/firebase.js"></script>

<script type="module" src="admin/confirmModal.js"></script>

<script type="module" src="admin/login.js"></script>

<script type="module" src="admin/app.js"></script>

</body>

</html>
