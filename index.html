<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* 背景 video */
.bgVideo {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* 🔥 保留居中 layout + 放大 */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  transform: scale(1.2); /* 🔥 核心放大 */
  transform-origin: center;
  text-align: center;
}

/* logo */
.logo {
  width: 110px;
  margin-bottom: 15px;
}

/* title */
.title {
  font-size: 26px;
  letter-spacing: 4px;
  margin-bottom: 30px;
}

/* form */
.form {
  width: 90%;
  max-width: 520px;
}

/* input */
input {
  width: 100%;
  padding: 18px;
  margin-bottom: 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 17px;
}

/* submit */
.submitBtn {
  width: 100%;
  padding: 18px;
  font-size: 16px;
  border-radius: 12px;
  background: linear-gradient(to right, #ff3c3c, #8b0000);
  border: none;
  color: white;
}

/* tip */
.tipBtn {
  margin-top: 15px;
  width: 100%;
  padding: 16px;
  font-size: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.3);
  background: transparent;
  color: white;
}

/* notes */
.notes {
  margin-top: 30px;
  font-size: 14px;
  line-height: 1.8;
  opacity: 0.8;
}

/* modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}

.modalContent {
  width: 90%;
  max-width: 420px;
  text-align: center;
}

.modal img {
  width: 85%;
  margin: 20px 0;
}

/* modal buttons */
.modalButtons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.modalButtons button {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
}
</style>

</head>

<body>

<!-- 🔥 你的 left video -->
<video class="bgVideo" autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/dbdiasouj/video/upload/v1782338377/lefft_ukxhta.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <img src="logo.png" class="logo">

  <div class="title">REQUEST A TRACK</div>

  <div class="form">

    <input type="text" placeholder="Your Name" id="name">
    <input type="text" placeholder="Song Artist" id="artist">
    <input type="text" placeholder="Song Name" id="song">

    <button class="submitBtn" onclick="submit()">SUBMIT REQUEST</button>

    <button class="tipBtn" onclick="openTip()">TIP THE DJ</button>

  </div>

  <div class="notes">
    • Please request well-known songs or worldwide club tracks.<br>
    • Must align with our music policy.<br>
    • We reserve the right to decline any request.<br>
    • Not all requests will be played.
  </div>

</div>

<!-- TIP -->
<div class="modal" id="tipModal">

  <div class="modalContent">

    <h2>TIP THE DJ</h2>

    <p>1. Screenshot QR</p>
    <p>2. Make payment</p>
    <p>3. Screenshot receipt</p>
    <p>4. Upload + enter amount</p>

    <img src="qr.png">

    <input type="file">
    <input type="number" placeholder="Enter amount (RM)">

    <div class="modalButtons">
      <button onclick="closeTip()">BACK</button>
      <button onclick="closeTip()">DONE</button>
    </div>

  </div>

</div>

</body>
</html>
