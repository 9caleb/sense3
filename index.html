<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
}

/* VIDEO BACKGROUND */
.bgVideo {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* container */
.container {
  padding: 40px 20px;
  text-align: center;
}

/* logo */
.logo {
  width: 80px;
  margin-bottom: 20px;
}

/* title */
.title {
  font-size: 22px;
  letter-spacing: 3px;
  margin-bottom: 30px;
}

/* input */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color: white;
  border-radius: 8px;
  font-size: 14px;
}

/* button */
button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(to right, #ff3c3c, #8b0000);
  border: none;
  color: white;
  font-size: 14px;
  border-radius: 8px;
  margin-top: 10px;
}

/* tip button */
.tipBtn {
  margin-top: 15px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
}

/* notes */
.notes {
  margin-top: 25px;
  font-size: 12px;
  opacity: 0.7;
  text-align: left;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.modalContent {
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.modal img {
  width: 80%;
  margin: 15px 0;
}
</style>

</head>

<body>

<!-- BACKGROUND VIDEO -->
<video class="bgVideo" autoplay muted loop playsinline>
  <source src="left.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <img src="logo.png" class="logo">

  <div class="title">REQUEST A TRACK</div>

  <form id="form">

    <input type="text" placeholder="Your Name" required id="name">
    <input type="text" placeholder="Song Artist" required id="artist">
    <input type="text" placeholder="Song Name" required id="song">

    <button type="submit">SUBMIT REQUEST</button>

  </form>

  <button class="tipBtn" onclick="openTip()">TIP THE DJ</button>

  <div class="notes">
    Please request well-known songs or worldwide club tracks.<br>
    Must align with our music policy.<br>
    We reserve the right to decline any request.<br>
    Not all requests will be played.
  </div>

</div>

<!-- TIP MODAL -->
<div class="modal" id="tipModal">

  <div class="modalContent">

    <h3>TIP THE DJ</h3>

    <p>1. Screenshot QR</p>
    <p>2. Make payment</p>
    <p>3. Screenshot receipt</p>
    <p>4. Upload + enter amount</p>

    <img src="qr.png">

    <input type="file" id="receipt">
    <input type="number" placeholder="Enter amount (RM)" id="amount">

    <button onclick="closeTip()">DONE</button>

  </div>

</div>

<script>
function openTip() {
  document.getElementById("tipModal").style.display = "flex";
}

function closeTip() {
  document.getElementById("tipModal").style.display = "none";
}

/* submit */
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    artist: document.getElementById("artist").value,
    song: document.getElementById("song").value,
    tip: document.getElementById("amount").value || 0
  };

  console.log("submit:", data);

  alert("Request submitted!");
});
</script>

</body>
</html>
