<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* 背景video */
.bgVideo {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* 暗层 */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* 主容器 */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center; /* 🔥 真正居中 */
  align-items: center;
  padding: 30px 20px;
  text-align: center;
}

/* logo */
.logo {
  width: 90px;
  margin-bottom: 25px;
}

/* 标题 */
.title {
  font-size: 26px;
  letter-spacing: 4px;
  margin-bottom: 35px;
}

/* form */
.form {
  width: 100%;
  max-width: 420px;
}

/* input */
input {
  width: 100%;
  padding: 16px;
  margin-bottom: 18px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 16px;
}

/* submit */
.submitBtn {
  width: 100%;
  padding: 16px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(to right, #ff3c3c, #8b0000);
  color: white;
}

/* tip */
.tipBtn {
  margin-top: 18px;
  width: 100%;
  padding: 14px;
  font-size: 14px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  color: white;
}

/* notes */
.notes {
  margin-top: 35px;
  font-size: 13px;
  opacity: 0.75;
  max-width: 320px;
  text-align: center; /* 🔥 居中 */
  line-height: 1.6;
}

/* modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}

.modalContent {
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.modal img {
  width: 75%;
  margin: 15px 0;
}

.modal input {
  margin-top: 10px;
}
</style>

</head>

<body>

<!-- 🔥 用 Cloudinary 的 left.mp4 -->
<video class="bgVideo" autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/dbdiasouj/video/upload/v1782338377/lefft_ukxhta.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <img src="logo.png" class="logo">

  <div class="title">REQUEST A TRACK</div>

  <div class="form">

    <input type="text" placeholder="Your Name" required id="name">
    <input type="text" placeholder="Song Artist" required id="artist">
    <input type="text" placeholder="Song Name" required id="song">

    <button class="submitBtn">SUBMIT REQUEST</button>

    <button class="tipBtn" onclick="openTip()">TIP THE DJ</button>

  </div>

  <div class="notes">
    Please request well-known songs or worldwide club tracks.<br>
    Must align with our music policy.<br>
    We reserve the right to decline any request.<br>
    Not all requests will be played.
  </div>

</div>

<!-- TIP -->
<div class="modal" id="tipModal">

  <div class="modalContent">

    <h3>TIP THE DJ</h3>

    <p>1. Screenshot QR</p>
    <p>2. Make payment</p>
    <p>3. Screenshot receipt</p>
    <p>4. Upload + enter amount</p>

    <img src="qr.png">

    <input type="file">
    <input type="number" placeholder="Enter amount (RM)">

    <button onclick="closeTip()">DONE</button>

  </div>

</div>

<script>
function openTip() {
  document.getElementById("tipModal").style.display = "flex";
}

function closeTip() {
  document.getElementById("tipModal").style.display = "none";
}
</script>

</body>
</html>
