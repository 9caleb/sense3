<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* 背景 */
.bgVideo {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: -1;
}

/* 主布局（🔥 关键） */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between; /* 🔥 上中下 */
  padding: 40px 20px;
}

/* 上 */
.top {
  text-align: center;
}

.logo {
  width: 120px;
  margin-bottom: 15px;
}

.title {
  font-size: 30px;
  letter-spacing: 4px;
}

/* 中 */
.middle {
  width: 100%;
}

.form {
  width: 100%;
}

input {
  width: 100%;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 18px;
}

/* 按钮 */
.submitBtn {
  width: 100%;
  padding: 20px;
  font-size: 18px;
  border-radius: 14px;
  background: linear-gradient(to right, #ff3c3c, #8b0000);
  border: none;
}

.tipBtn {
  margin-top: 20px;
  width: 100%;
  padding: 18px;
  font-size: 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.4);
  background: transparent;
}

/* 下 */
.bottom {
  text-align: center;
}

.notes {
  font-size: 14px;
  line-height: 1.8;
  opacity: 0.8;
}

/* modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}

.modalContent {
  width: 90%;
  text-align: center;
}

.modal img {
  width: 90%;
  margin: 20px 0;
}

.modalButtons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.modalButtons button {
  flex: 1;
  padding: 16px;
  border-radius: 12px;
  border: none;
}
</style>

</head>

<body>

<video class="bgVideo" autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/dbdiasouj/video/upload/v1782338377/lefft_ukxhta.mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <!-- 上 -->
  <div class="top">
    <img src="logo.png" class="logo">
    <div class="title">REQUEST A TRACK</div>
  </div>

  <!-- 中 -->
  <div class="middle">
    <div class="form">

      <input type="text" placeholder="Your Name" id="name">
      <input type="text" placeholder="Song Artist" id="artist">
      <input type="text" placeholder="Song Name" id="song">

      <button class="submitBtn" onclick="submit()">SUBMIT REQUEST</button>

      <button class="tipBtn" onclick="openTip()">TIP THE DJ</button>

    </div>
  </div>

  <!-- 下 -->
  <div class="bottom">
    <div class="notes">
      • Please request well-known songs or worldwide club tracks.<br>
      • Must align with our music policy.<br>
      • We reserve the right to decline any request.<br>
      • Not all requests will be played.
    </div>
  </div>

</div>

<!-- TIP -->
<div class="modal" id="tipModal">
  <div class="modalContent">

    <h2>TIP THE DJ</h2>

    <p>1. Screenshot QR</p>
    <p>2. Make payment</p>
    <p>3. Screenshot receipt</p>
    <p>4. Upload + enter amount</p>

    <img src="qr.png">

    <input type="file">
    <input type="number" placeholder="Enter amount (RM)">

    <div class="modalButtons">
      <button onclick="closeTip()">BACK</button>
      <button onclick="closeTip()">DONE</button>
    </div>

  </div>
</div>

<script>
function openTip() {
  document.getElementById("tipModal").style.display = "flex";
}
function closeTip() {
  document.getElementById("tipModal").style.display = "none";
}

function submit(){
  const name = document.getElementById("name");
  const artist = document.getElementById("artist");
  const song = document.getElementById("song");

  if(!name.value || !artist.value || !song.value){
    alert("Fill all fields");
    return;
  }

  name.disabled = true;
  artist.value = "";
  song.value = "";

  alert("Submitted");
}
</script>

</body>
</html>
