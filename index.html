<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Request</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at 30% 30%, #3a0000, #000);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 30px 20px;
  text-align: center;
}

.logo {
  width: 80px;
  margin: 20px auto;
  animation: spin 20s linear infinite;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

h1 {
  font-size: 18px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #b30000;
  color: white;
  font-weight: bold;
}

.policy {
  font-size: 12px;
  margin-top: 15px;
  opacity: 0.6;
}

.tips {
  margin-top: 15px;
  font-size: 13px;
  opacity: 0.8;
  cursor: pointer;
}

.popup {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  padding: 20px;
  display: none;
}

.qr {
  width: 200px;
  margin: 10px auto;
}
</style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo">

  <h1>Request a track</h1>

  <input id="name" placeholder="Your name">
  <input id="artist" placeholder="Song artist">
  <input id="song" placeholder="Song name">

  <button onclick="submit()">Submit</button>

  <div class="tips" onclick="showTips()">Skip the queue / Tip</div>

  <div class="policy">
    Please request well-known songs or worldwide club tracks
  </div>
</div>

<div class="popup" id="popup">
  <p>1. Screenshot QR</p>
  <p>2. Make payment</p>
  <p>3. Screenshot receipt</p>
  <p>4. Upload + enter amount</p>

  <img src="qr.png" class="qr">

  <input id="amount" placeholder="Amount (RM)">
  <input type="file" id="receipt">

  <button onclick="closeTips()">Done</button>
</div>

<script>
function showTips() {
  document.getElementById("popup").style.display = "block";
}

function closeTips() {
  document.getElementById("popup").style.display = "none";
}

function submit() {
  alert("Submitted (Firebase connect next step)");
}
</script>

</body>
</html>
